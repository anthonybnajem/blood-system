name: Mac Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate mac signing secrets
        id: validate_secrets
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [[ -n "$MAC_CERTIFICATE_P12_BASE64" ]] || missing+=("MAC_CERTIFICATE_P12_BASE64")
          [[ -n "$MAC_CERTIFICATE_PASSWORD" ]] || missing+=("MAC_CERTIFICATE_PASSWORD")
          [[ -n "$APPLE_ID" ]] || missing+=("APPLE_ID")
          [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_TEAM_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required mac release secrets: ${missing[*]}"
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "can_publish=true" >> "$GITHUB_OUTPUT"

      - name: Prepare mac signing certificate
        if: steps.validate_secrets.outputs.can_publish == 'true'
        env:
          MAC_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
        run: |
          CERT_PATH="$RUNNER_TEMP/macos-signing-cert.p12"
          echo "$MAC_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Build and publish Mac release
        if: steps.validate_secrets.outputs.can_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run desktop:dist:mac:release

      - name: Skip unsigned mac release
        if: steps.validate_secrets.outputs.can_publish != 'true'
        run: echo "Skipping mac release publish because required Apple signing/notarization secrets are not configured."
